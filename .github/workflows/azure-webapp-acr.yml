name: Build and deploy to Azure Web App via ACR

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE_NAME: patan
  ACR_USERNAME: honeyhive
  ACR_LOGIN_SERVER: honeyhive.azurecr.io
  AZURE_WEBAPP_NAME: honeyhive
  AZURE_RESOURCE_GROUP: g1b
  DOCKERFILE_PATH: ./Dockerfile

jobs:
  build-and-push:
    name: Build and push Docker image to ACR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy Azure Web App from ACR image
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Prisma CLI
        run: npm install prisma@latest --no-save

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL is not set. Add it to GitHub Actions secrets."
            exit 1
          fi
          npx prisma migrate deploy

      - name: Validate Azure Web App exists
        run: |
          az account show
          az webapp show --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query id -o tsv

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: patan
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment health
        run: |
          echo "Waiting for container to start..."
          sleep 30
          WEBAPP_URL="https://${AZURE_WEBAPP_NAME}-patan.azurewebsites.net"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$WEBAPP_URL" || echo "000")
          echo "Health check response: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 500 ]; then
            echo "::error::Deployment health check failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Deployment healthy (status: $HTTP_STATUS)"
